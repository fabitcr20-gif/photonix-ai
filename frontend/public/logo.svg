<svg width="620" height="130" viewBox="0 0 620 130" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo de Photonix AI (cámara + obturador + wordmark), en tonos claros
       para verse sobre el fondo oscuro premium (#0B0B0D). -->
  <defs>
    <clipPath id="shutterClip">
      <circle cx="65" cy="65" r="34"/>
    </clipPath>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6cf6"/>
      <stop offset="100%" stop-color="#4f8ef7"/>
    </linearGradient>
  </defs>

  <!-- Cuerpo de cámara -->
  <path d="M20 45 h20 l8 -12 h34 l8 12 h20 a8 8 0 0 1 8 8 v52 a8 8 0 0 1 -8 8 H20 a8 8 0 0 1 -8 -8 V53 a8 8 0 0 1 8 -8 Z"
        fill="none" stroke="#f2f2f5" stroke-width="7" stroke-linejoin="round"/>

  <!-- Obturador estilizado (aspas) -->
  <g clip-path="url(#shutterClip)">
    <circle cx="65" cy="65" r="34" fill="#8b8b9a" opacity="0.3"/>
    <g fill="#f2f2f5">
      <path d="M65 65 L65 31 A34 34 0 0 1 94 48 Z"/>
      <path d="M65 65 L94 48 A34 34 0 0 1 94 82 Z"/>
      <path d="M65 65 L94 82 A34 34 0 0 1 65 99 Z"/>
      <path d="M65 65 L65 99 A34 34 0 0 1 36 82 Z"/>
      <path d="M65 65 L36 82 A34 34 0 0 1 36 48 Z"/>
      <path d="M65 65 L36 48 A34 34 0 0 1 65 31 Z"/>
    </g>
    <circle cx="65" cy="65" r="12" fill="#0b0b0d"/>
  </g>
  <circle cx="65" cy="65" r="34" fill="none" stroke="#f2f2f5" stroke-width="4"/>

  <!-- Puntos decorativos (esquina superior derecha de la cámara) -->
  <g fill="#8b8b9a">
    <rect x="96" y="16" width="8" height="8"/>
    <rect x="110" y="16" width="8" height="8" opacity="0.7"/>
    <rect x="96" y="30" width="8" height="8" opacity="0.7"/>
    <rect x="82" y="8" width="6" height="6" opacity="0.5"/>
  </g>

  <!-- Separador -->
  <rect x="150" y="20" width="4" height="90" fill="#3a3a42"/>

  <!-- Wordmark -->
  <text x="175" y="82" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#f2f2f5" letter-spacing="2">
    PHOTONIX <tspan fill="url(#aiGradient)">AI</tspan>
  </text>
</svg>
